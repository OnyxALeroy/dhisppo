version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: dhisppo-mongodb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - dhisppo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dhisppo-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/${MONGO_DB}?authSource=admin
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - CORS_ORIGINS=["http://localhost:3000", "http://frontend:3000"]
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    
    networks:
      - dhisppo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dhisppo-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    
    networks:
      - dhisppo-network

volumes:
  mongodb_data:

networks:
  dhisppo-network:
    driver: bridge